name: Fetch GNSS GP data

on:
  schedule:
    - cron: '32 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-gnss-gp
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch multi-GNSS TLE data
        run: python scripts/fetch_gnss_gp.py
      - name: Show generated files
        run: |
          echo "--- docs/data/gnss ---"
          find docs/data/gnss -maxdepth 1 -type f -print -exec wc -l {} \; | sort
          echo "--- git status ---"
          git status --short
      - name: Commit GNSS updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/data/gnss
          if git diff --cached --quiet; then
            echo "No GNSS changes to commit"
          else
            git commit -m "data: update GNSS GP data"
            git push
          fi

name: Fetch GNSS TLE and Almanac

on:
  schedule:
    - cron: '20 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-gnss-almanac
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch GNSS TLE and GPS almanac health
        run: python scripts/fetch_gnss_almanac_daily.py
      - name: Commit GNSS data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/data/gnss docs/vendor
          if git diff --cached --quiet; then
            echo "No GNSS data changes to commit"
          else
            git commit -m "data: update GNSS TLE and almanac health"
            git pull --rebase
            git push
          fi

name: Fetch NOAA TEC archive

on:
  schedule:
    # 1日2回。UTC 00:12 / 12:12 = JST 09:12 / 21:12。
    - cron: '12 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-noaa-tec-archive
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch NOAA GloTEC archive
        run: python scripts/fetch_noaa_tec_archive.py

      - name: Commit archive updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'data: update NOAA GloTEC archive'
          file_pattern: 'docs/data/tec/**'

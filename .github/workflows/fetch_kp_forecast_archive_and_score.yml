name: Fetch Kp Forecast Archive and Score

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-kp-forecast-archive
  cancel-in-progress: false

jobs:
  fetch-score:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backfill NOAA TEC archive first
        env:
          SWIFTTEC_LOOKBACK_HOURS: "120"
          SWIFTTEC_MAX_PER_RUN: "240"
          SWIFTTEC_KEEP_DAYS: "30"
          SWIFTTEC_TARGET_INTERVAL_MIN: "30"
          SWIFTTEC_MAX_DIFF_MIN: "25"
        run: python scripts/fetch_noaa_tec_archive.py

      - name: Archive forecast Kp and score operational hit rate
        run: python scripts/fetch_kp_forecast_archive_and_score.py

      - name: Commit TEC archive, Kp forecast archive, and operational score
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/data/tec docs/data/ai/kp_forecast_archive.json docs/data/ai/operational_hit_rate.json
          if git diff --cached --quiet; then
            echo "No TEC/Kp score changes to commit"
          else
            git commit -m "data: update TEC archive and Kp operational hit rate"
            git pull --rebase
            git push
          fi
